<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Creating a Library Membership Registration Form Using Html</h1>
    <fieldset>
    <legend>Personal Information</legend>
        <label for="fname">First Name:</label>
        <input type="text" name="fname" id="fname" required>
          <br><br>

        <label for="fname">Last Name:</label>
        <input type="text" name="lname" id="lname" required>
        <br><br>

          <label for="Email">Email:</label>
        <input type="email" name="Email" id="Email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password"required>
        <br><br>

         <label for="dob">date of Birth:</label>
        <input type="date" name="dob" id="dob" required>
        <br><br>

        <label for="Phone_Number ">MyPhone :</label>
        <input type="Phone_Number" number="Phone_Number" id="Phone_Number" required>  
        <br><br>      
        
         Gender:
        <input type="radio" name=" gender" id="male" value="male">
        <label for="male">male</label>

         <input type="radio" name="gender" id="female" value="Female">
        <label for="female">Female</label>

        <input type="radio" name="gender" id="Others" value="others">
        <label for="female">Others</label>

        
     </fieldset>


     <fieldset>
        <legend>Membership Information </legend>
     
         <label for="Membership Type">Membership Type :</label>
          <select name="department" id="department">
            <option value="">Membership type</option>
            <option value="Student">Student</option>
            <option value="Faculty">Faculty</option>
            <option value="Researcher">Researcher</option>
             <option value="General Member">General Member</option>
          </select>
          <br><br>
        <label for="Library Selection">Library Selection </label> :</label>
          <select name="Library selection" id="Library Selection:">
             <option value="Selection"> Selection</option>
            <option value="Science And TEchnology"> Science and Technology</option>
            <option value="Literature">Literature</option>
            <option value="Business Studies">Business</option>
            <option value="History">History</option>
             <option value="Art and cultyre">Art and Culture</option>
          </select>
          <br>
          <br>


         <label for="Service">Select Service:</label> :</label>
          <select name="Borrowing Book" id="Service">
            <option value="Select Service"> Select Service </option>
            <option value="Borrowing Book">Borrowing Book</option>
            <option value="Digital Library Access">Library Access</option>
            <option value="Reading Room">Reading Room</option>
             <option value="Research Assistance">Research Assistance</option>
          </select>



          <h4>Select Favourite Book Category : </h4>
           <input type="radio" name=" Fiction" id="Fiction" value="Fiction">
        <label for="Fiction">Fiction</label><br>

          <input type="radio" name=" Non-Fiction" id="Non-Fiction" value="Non-Fiction">
        <label for="Non-Fiction">Non-Fiction</label><br>
          
        <input type="radio" name=" Science" id="Sciencen" value="Science">
        <label for="Science">Science</label><br>

        <input type="radio" name=" Biography" id="Biography" value="Biography">
        <label for="Biography">Biography</label><br>

        <input type="radio" name=" History" id="History" value="History">
        <label for="History">History</label><br>


        
          </fieldset>
          
          <fieldset>
            <legend>Additional Information :</legend>
            <br>
            <label for="Address">Current Address:</label>
        <input type="text" name="address" id="address" required>
          <br><br>

          
        <label for="Phone_Number "> Emergency Contact :</label>
        <input type="Phone_Number" number="Phone_Number" id="Phone_Number" required>  
        <br><br>      

        <label for="Reason For Joining"> Reason For joining :</label>
        <input type="Phone_Number" number="Phone_Number" id="Phone_Number" required>  
        <br><br>    

        
        <label for="address"> Suggestion :</label>
        <input type="address" number="address" id="address" rows="4" cols="40" required>  
        <br><br>  
           
           
          </fieldset>
          <input type="submit" id="file" name="file">
          <input type="reset" id="file" name="Clear">


          <fieldset>
     <legend>Additional Information</legend>
       
<label for="address"> Current Address:</label>
 <textarea name="address" id="address" rows="4" cols="40"></textarea>
    <br><br>
       
    <label for="contact">Emergency Contact Number :</label>
  <input type="tel" name="contact" id="contact" required>
   <br><br>
   
<label for="reason"> Reason for Joining the Library:</label>
<textarea name="reason" id="reason" rows="5" cols="40"></textarea>
    <br><br>
 
<label for="suggestion">Suggestions for Library Improvement:</label>
<textarea name="suggestion" id="suggestion" rows="5" cols="40"></textarea>
    <br><br>
 
 
    </fieldset>
    <br><br>







    
</body>
</html>
